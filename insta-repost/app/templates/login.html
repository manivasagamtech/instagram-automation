{% extends "base.html" %}
{% block title %}Login — Meme Bot{% endblock %}

{% block content %}
<div class="card" style="max-width:380px;margin:4rem auto;">
  <h1>🤖 Meme Bot</h1>
  <p class="text-muted mt-1">Enter the bot password to continue.</p>

  {% if error %}
    <div class="flash error mt-2">{{ error }}</div>
  {% endif %}

  <form method="post" action="{{ url_for('login') }}" class="mt-3" autocomplete="off">
    <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">

    <label for="password">Password</label>
    <input
      id="password"
      name="password"
      type="password"
      autofocus
      autocomplete="current-password"
      required
      placeholder="••••••••"
    >

    <button type="submit" class="btn btn-primary btn-block mt-2">
      Log in
    </button>
  </form>
</div>
{% endblock %}
